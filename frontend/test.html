<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<style>
/* ================= HERO ================= */
.invitation-hero {
    position: relative;
    height: 85vh;
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    overflow: hidden;
    margin-top: 0;          /* Space for fixed navbar */
}
.invitation-hero video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

.invitation-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

.invitation-hero h2 {
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 15px;
}

.invitation-hero .lead {
    font-size: 1.3rem;
    max-width: 600px;
    margin: auto;
}

.invitation-hero .btn {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    font-size: 1.1rem;
}

/* ================= GALLERY ================= */
.invitation-gallery {
    padding: 80px 0;
    background: #f8f9fa;
}

.invitation-gallery h2 {
    text-align: center;
    margin-bottom: 50px;
    font-size: 2.4rem;
    font-weight: 700;
}

.invitation-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.invitation-item {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    transition: .3s;
}

.invitation-item:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.invitation-item img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    cursor: pointer;
    transition: .4s;
}

.invitation-item:hover img {
    transform: scale(1.1);
}

.invitation-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.65);
    color: white;
    padding: 12px;
    text-align: center;
    font-size: .9rem;
    opacity: 0;
    transition: .3s;
}

.invitation-item:hover .invitation-caption {
    opacity: 1;
}

/* ================= MODAL ================= */
.invitation-modal-img {
    width: 100%;
    border-radius: 10px;
}

/* ================= MOBILE ADJUSTMENTS (only for page content, NOT navbar) ================= */
@media(max-width:768px) {
    .invitation-hero {
        height: 70vh;
    }
    .invitation-hero h2 {
        font-size: 2rem;
    }
    .invitation-hero .lead {
        font-size: 1rem;
    }
    .invitation-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
}
